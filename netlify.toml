# Netlify configuration for LZS PCO Demo (Next.js in frontend/)
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Next.js app lives in frontend/ 
  base = "frontend"
  command = "npm run build"
  publish = ".next"

# Essential Next.js plugin for App Router, SSR, and correct routing
[[plugins]]
  package = "@netlify/plugin-nextjs"
